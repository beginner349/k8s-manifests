apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-credentials
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0" # before the Keycloak CR (wave 1)

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: keycloak-db-credentials
    creationPolicy: Owner

  data:
    - secretKey: username
      remoteRef:
        key: rds!cluster-3524805a-1526-4fa6-bc0e-067bed8a0953
        property: username

    - secretKey: password
      remoteRef:
        key: rds!cluster-3524805a-1526-4fa6-bc0e-067bed8a0953
        property: password