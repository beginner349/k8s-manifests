apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: myrealm
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2" # runs after the Keycloak CR (wave 1) is up
spec:
  keycloakCRName: keycloak  # must match metadata.name of the Keycloak CR
  realm:
    realm: myrealm
    enabled: true
    clients:
      - clientId: myclient
        enabled: true
        protocol: openid-connect
        publicClient: true
        redirectUris:
          - https://oauth.pstmn.io/v1/browser-callback
        webOrigins:
          - "*"
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
    users:
      - username: myuser
        enabled: true
        firstName: Jiajun
        lastName: Chen
        email: c.jiajun.92@gmail.com
        credentials:
          - type: password
            value: password
            temporary: false