apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak  # → service "keycloak-service", admin secret "keycloak-initial-admin"
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hostname:
    hostname: https://auth.beginner349.com
  resources:
    requests:
      cpu: "2"
      memory: "1250M"
    limits:
      cpu: "6"
      memory: "2250M"
  db:
    vendor: postgres
    host: keycloak-db.cluster-c7oa4icsqutl.ap-southeast-1.rds.amazonaws.com
    port: 5432
    database: keycloak
    poolMinSize: 5
    poolInitialSize: 5
    poolMaxSize: 15
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password
  additionalOptions:
    - name: db-tls-mode
      value: verify-server  # turns on TLS + server-cert verification using the truststore below
  http:
    httpEnabled: true
  instances: 3
  truststores:
    aurora:
      configMap:
        name: rds-ca-bundle
  proxy:
    headers: xforwarded      # TLS terminates at the ALB
  ingress:
    enabled: false           # we bring our own ALB Ingress below