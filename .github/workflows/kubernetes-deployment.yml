name: Bootstrap ArgoCD

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.35.0'

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_DEFAULT_REGION }} --name my-eks-cluster

      # - name: Deploy with Kustomize
      #   run: |
      #       cd base
      #       kustomize edit set image spring-boot-app=${{ vars.AWS_ECR }}/beginner349-app:${{ vars.IMAGE_TAG }}
      #       kubectl apply -k .

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: 'v4.2.0'

      - name: Install ArgoCD (uses argocd/bootstrap/values.yaml)
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm        
          helm repo update
          helm upgrade --install argocd argo/argo-cd -n argocd --create-namespace \
            --version 9.5.19 -f argocd/bootstrap/values.yaml --wait

      - name: Hand off to GitOps — from here on ArgoCD does everything
        run: |
          kubectl apply -f argocd/projects/project.yaml
          kubectl apply -f argocd/root-app.yaml

      - name: Show ArgoCD admin password
        run: |
          echo "=== admin password (user: admin) ==="
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' | base64 -d; echo

