apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: beginner349
  source:
    repoURL: 'https://github.com/beginner349/k8s-manifests.git'
    targetRevision: main
    path: base
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: beginner349-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
