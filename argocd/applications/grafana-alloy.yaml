apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: beginner349
  sources:
    - repoURL: 'https://grafana.github.io/helm-charts'
      chart: alloy
      targetRevision: 1.8.2
      helm:
        valueFiles:
          - $values/alloy-values.yaml
    - repoURL: 'https://github.com/beginner349/k8s-manifests.git'
      targetRevision: main
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
