apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storageclass
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: beginner349
  source:
    repoURL: https://github.com/beginner349/k8s-manifests.git
    path: infra
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    # just set a namespace that is allowed from the project.yaml, it doesnt matter since StorageClass is cluster level resource
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true