workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - deploy

deploy:
  stage: deploy
  image:
    name: amazon/aws-cli:2.31.13
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  before_script:
    - |
      echo "${GITLAB_OIDC_TOKEN}" > /tmp/web_identity_token
      export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token
      export AWS_ROLE_ARN=${AWS_ROLE_ARN}
      export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION} # Ensure region is set
    - KUBECTL_VERSION=v1.35.0
    - curl -LO https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
    - kubectl version --client
  script:
    - aws eks update-kubeconfig --region ${AWS_DEFAULT_REGION} --name my-eks-cluster
    - kubectl apply -f base/01-namespace.yaml
    - kubectl apply -f base/02-deployment.yaml
    - kubectl apply -f base/03-service.yaml
    - kubectl apply -f base/04-ingressclassparams.yaml
    - kubectl apply -f base/05-ingressclass.yaml
    - kubectl apply -f base/06-ingress.yaml
  when: manual
 